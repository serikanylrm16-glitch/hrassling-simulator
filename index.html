<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Wrassling - Ultimate Ring Edition</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; background: radial-gradient(circle, #333 0%, #000 100%); image-rendering: pixelated; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; }
        .score { font-size: 60px; color: #f1c40f; text-shadow: 4px 4px 0 #c0392b; letter-spacing: 10px; }
        .controls { color: #fff; font-size: 14px; margin-top: 15px; background: rgba(255,0,0,0.2); padding: 10px; border: 2px solid #f1c40f; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="score"><span id="p1Score">0</span> : <span id="p2Score">0</span></div>
        <div class="controls">
            <b>P1:</b> A-D (Hareket) | W (Zıpla) | E-R (Kolları Manuel Çevir)<br>
            <b>P2:</b> ←→ (Hareket) | ↑ (Zıpla) | O-P (Kolları Manuel Çevir)
        </div>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const WORLD_GRAVITY = 0.65;
const FRICTION = 0.88;
const RING_Y = canvas.height - 180;
const RING_X = canvas.width / 2 - 450;
const RING_W = 900;

class Fighter {
    constructor(x, color, controls, name) {
        this.x = x;
        this.y = RING_Y - 200;
        this.vx = 0;
        this.vy = 0;
        this.w = 60;
        this.h = 100;
        this.color = color;
        this.controls = controls;
        this.dir = (name === "P1") ? 1 : -1;
        this.armAngle = 0;
        this.armSpeed = 0; // Başlangıçta duruyor (Otomatik dönme yok)
        this.isGrounded = false;
        this.score = 0;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x + this.w/2, this.y + this.h/2);
        
        // Gövde ve Kafa
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 4;

        // Ayaklar
        ctx.fillStyle = "#222";
        ctx.fillRect(-25, 20, 20, 30); // Sol
        ctx.fillRect(5, 20, 20, 30);  // Sağ

        // Gövde
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.w/2, -45, this.w, 70);
        ctx.strokeRect(-this.w/2, -45, this.w, 70);

        // Kafa
        ctx.fillStyle = "#ffdbac";
        ctx.fillRect(-20, -85, 40, 40);
        ctx.strokeRect(-20, -85, 40, 40);
        
        // Göz (Yönüne göre)
        ctx.fillStyle = "#000";
        ctx.fillRect(this.dir * 12, -75, 8, 8);

        // KOLLAR (Kaslı ve Boğumlu Tasarım)
        ctx.restore();
        ctx.save();
        ctx.translate(this.x + this.w/2, this.y + this.h/2 - 20);
        ctx.rotate(this.armAngle);

        // Gerçekçi kol çizimi (Sopa değil, kaslı yapı)
        const drawArm = (direction) => {
            ctx.save();
            ctx.scale(direction, 1);
            ctx.fillStyle = "#ffdbac";
            ctx.strokeStyle = "#000";
            
            // Omuzdan dirseğe
            ctx.beginPath();
            ctx.roundRect(0, -10, 50, 20, 10);
            ctx.fill(); ctx.stroke();
            
            // Dirsekten ele (Biraz daha ince)
            ctx.beginPath();
            ctx.roundRect(40, -8, 45, 16, 8);
            ctx.fill(); ctx.stroke();
            
            // Yumruk
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(85, 0, 12, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
            ctx.restore();
        };

        drawArm(1);  // Ön kol
        drawArm(-1); // Arka kol
        ctx.restore();
    }

    update() {
        this.vy += WORLD_GRAVITY;
        this.y += this.vy;
        this.x += this.vx;
        this.vx *= FRICTION;

        if (this.y + this.h > RING_Y && this.x + this.w > RING_X && this.x < RING_X + RING_W) {
            if (this.vy > 0) {
                this.y = RING_Y - this.h;
                this.vy = 0;
                this.isGrounded = true;
            }
        } else {
            this.isGrounded = false;
        }

        // Kolların dönmesi (Sadece hız varsa döner)
        this.armAngle += this.armSpeed;
        this.armSpeed *= 0.9; // Tuşu bırakınca durması için sönümleme

        if (this.y > canvas.height) this.handleDeath();
    }

    handleDeath() {
        if (this === p1) p2.score++; else p1.score++;
        document.getElementById('p1Score').innerText = p1.score;
        document.getElementById('p2Score').innerText = p2.score;
        resetPosition();
    }
}

const p1 = new Fighter(RING_X + 100, "#c0392b", {up:'KeyW', left:'KeyA', right:'KeyD', aL:'KeyE', aR:'KeyR'}, "P1");
const p2 = new Fighter(RING_X + RING_W - 160, "#2980b9", {up:'ArrowUp', left:'ArrowLeft', right:'ArrowRight', aL:'KeyO', aR:'KeyP'}, "P2");

function drawAtmosphere() {
    // Seyirciler (Basit pixel noktalar)
    for(let i=0; i<canvas.width; i+=40) {
        ctx.fillStyle = `hsl(0, 0%, ${Math.random()*20+10}%)`;
        ctx.fillRect(i, RING_Y - 50, 30, 50);
    }

    // Spot Işıkları
    ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
    ctx.beginPath();
    ctx.moveTo(RING_X, 0); ctx.lineTo(RING_X+200, RING_Y); ctx.lineTo(RING_X-200, RING_Y);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(RING_X+RING_W, 0); ctx.lineTo(RING_X+RING_W+200, RING_Y); ctx.lineTo(RING_X+RING_W-200, RING_Y);
    ctx.fill();

    // RİNG VE İPLER
    ctx.fillStyle = "#7f8c8d"; 
    ctx.fillRect(RING_X, RING_Y, RING_W, 400); // Ring zemini
    
    // Köşe Direkleri
    ctx.fillStyle = "#222";
    ctx.fillRect(RING_X - 10, RING_Y - 120, 20, 130);
    ctx.fillRect(RING_X + RING_W - 10, RING_Y - 120, 20, 130);

    // Ring İpleri
    ctx.strokeStyle = "#eee";
    ctx.lineWidth = 4;
    for(let i=0; i<3; i++) {
        let y = RING_Y - 40 - (i * 35);
        ctx.beginPath();
        ctx.moveTo(RING_X, y);
        ctx.lineTo(RING_X + RING_W, y);
        ctx.stroke();
    }
}

function resolvePhysics() {
    let dx = (p1.x + p1.w/2) - (p2.x + p2.w/2);
    let dist = Math.abs(dx);
    if (dist < 150 && Math.abs(p1.y - p2.y) < 100) {
        let power = (Math.abs(p1.armSpeed) + Math.abs(p2.armSpeed)) * 30;
        let dir = dx > 0 ? 1 : -1;
        p1.vx += dir * power;
        p2.vx -= dir * power;
        p1.vy -= power * 0.5;
        p2.vy -= power * 0.5;
    }
}

function resetPosition() {
    p1.x = RING_X + 100; p2.x = RING_X + RING_W - 160;
    p1.y = p2.y = RING_Y - 200;
    p1.vx = p2.vx = p1.vy = p2.vy = 0;
    p1.armSpeed = p2.armSpeed = 0;
}

const keys = {};
window.onkeydown = (e) => {
    keys[e.code] = true;
    if(e.code === p1.controls.up && p1.isGrounded) p1.vy = -15;
    if(e.code === p2.controls.up && p2.isGrounded) p2.vy = -15;
};
window.onkeyup = (e) => keys[e.code] = false;

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawAtmosphere();

    // Input İşleme
    if(keys[p1.controls.left]) { p1.vx -= 1.5; p1.dir = -1; }
    if(keys[p1.controls.right]) { p1.vx += 1.5; p1.dir = 1; }
    if(keys[p1.controls.aL]) p1.armSpeed -= 0.15;
    if(keys[p1.controls.aR]) p1.armSpeed += 0.15;

    if(keys[p2.controls.left]) { p2.vx -= 1.5; p2.dir = -1; }
    if(keys[p2.controls.right]) { p2.vx += 1.5; p2.dir = 1; }
    if(keys[p2.controls.aL]) p2.armSpeed -= 0.15;
    if(keys[p2.controls.aR]) p2.armSpeed += 0.15;

    p1.update(); p2.update();
    resolvePhysics();
    p1.draw(); p2.draw();

    requestAnimationFrame(loop);
}

loop();
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>
</body>
</html>
